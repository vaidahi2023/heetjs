<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    5
    1*2*3*4*5
     -->
    <script>
        n=parseInt(prompt("Enter the number"))
        var i,fact=1
        i=1
        while(i<=n)
        {
            fact=fact*i;
            i++
        }
        alert("factorial of number is "+fact)
    </script>
</body>
</html>
