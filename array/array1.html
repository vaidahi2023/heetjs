<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a=[1,2,3,4] 
        let max
        max=a[0]
        for(let i=0;i<a.length;i++)
        {
                if(a[i]>max) //1>1 2>1 3>2 4>3
                {
                    max=a[i] //max=2 3 4
                }
        }
        console.log("maximum number is"+max)

    </script>
</body>
</html>
